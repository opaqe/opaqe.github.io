# ── 사이트 정보 ───────────────────────────────────────────────
title: "Ayden's Tech Blog"
description: "개발 기록"
author: "Ayden"
lang: ko-KR

# 배포 URL (사용자 페이지: https://opaqe.github.io/)
url: "https://opaqe.github.io"
baseurl: ""

# ── 테마 & 플러그인 ───────────────────────────────────────────
theme: jekyll-theme-cayman
plugins:
  - jekyll-feed       # /feed.xml RSS
  - jekyll-seo-tag    # <head> SEO/OG 메타태그
  - jekyll-sitemap    # /sitemap.xml

minima:
  skin: auto          # 라이트/다크 자동

# 상단 네비게이션 메뉴 (좌측 사이트 제목은 홈으로 자동 링크됨)
header_pages:
  - blog.md
  - spring.md
  - about.md

# ── 마크다운 & URL ────────────────────────────────────────────
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/
timezone: Asia/Seoul

# ── 글 기본값 ─────────────────────────────────────────────────
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

# ── 빌드 제외 ─────────────────────────────────────────────────
exclude:
  - AGENTS.md
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle
